name: Cudo-Direct-Link
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  mining:
    runs-on: ubuntu-latest
    steps:
      - name: Start Cudo Worker
        run: |
          # تحميل السكربت
          wget -qO install_cudo.sh https://download.cudo.org/tenants/135790374f46b0107c516a5f5e13069b/5e5f800fdf87209fdf8f9b61441e53a1/linux/x64/stable/install.sh
          chmod +x install_cudo.sh
          
          # التنصيب السريع (Headless)
          echo -e "2\nrespectable-ox\ny\n1" | sudo ./install_cudo.sh
          
          echo "Linking with Access Key..."
          # استخدام الـ Access Key للربط المباشر
          sudo cudo-miner-cli login --access-key a92281a0644429c9836011d86f274a26
          
          # تشغيل التعدين
          sudo cudo-miner-service start
          
          echo "Success! Worker is linked and running."
          sleep 21000
